<svg width="1440" height="980" viewBox="0 0 1440 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadowDark" x="176" y="112" width="1088" height="296" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <filter id="shadowDarkSoft" x="216" y="444" width="1008" height="344" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
    <style>
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #F8FAFC; }
      .label { font: 600 18px Inter, Arial, sans-serif; fill: #FFE2DD; }
      .bodySoft { font: 500 15px Inter, Arial, sans-serif; fill: #F7C5BF; opacity: 0.84; }
      .meta { font: 500 14px Inter, Arial, sans-serif; fill: #F7C5BF; opacity: 0.8; }
      .buttonText { font: 600 15px Inter, Arial, sans-serif; fill: #FFE2DD; }
      .badgeText { font: 600 13px Inter, Arial, sans-serif; fill: #FFE2DD; }
      .sectionLabel { font: 600 18px Inter, Arial, sans-serif; fill: #94A3B8; }
    </style>
  </defs>

  <rect width="1440" height="980" fill="#0F172A"/>
  <text x="220" y="88" class="title">Improver Submission Success Preview · Dark Mode</text>

  <text x="220" y="156" class="sectionLabel">Top Modal Success Banner</text>
  <g filter="url(#shadowDark)">
    <rect x="220" y="180" width="1000" height="160" rx="24" fill="#3A1D1D" fill-opacity="0.55"/>
    <rect x="221" y="181" width="998" height="158" rx="23" stroke="#EB6C6C" stroke-opacity="0.30" stroke-width="2"/>
  </g>
  <circle cx="294" cy="260" r="36" fill="#10B981"/>
  <path d="M277 260.5L289 272.5L313 248.5" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="346" y="248" class="label">Submission Complete</text>
  <text x="346" y="278" class="bodySoft">North Beach clean-up was submitted successfully.</text>
  <g>
    <rect x="1032" y="232" width="132" height="56" rx="16" fill="#281515" fill-opacity="0.84"/>
    <rect x="1033" y="233" width="130" height="54" rx="15" stroke="#EB6C6C" stroke-opacity="0.30" stroke-width="2"/>
    <text x="1080" y="266" text-anchor="middle" class="buttonText">Done</text>
  </g>

  <text x="220" y="486" class="sectionLabel">Submitted Step Card</text>
