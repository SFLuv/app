    <rect x="261" y="511" width="918" height="218" rx="23" stroke="#EB6C6C" stroke-opacity="0.30" stroke-width="2"/>
  </g>
  <circle cx="320" cy="572" r="22" fill="#10B981"/>
  <path d="M309 572L317 580L333 564" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
