<svg width="1440" height="980" viewBox="0 0 1440 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadowLight" x="176" y="112" width="1088" height="296" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLightSoft" x="216" y="444" width="1008" height="344" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #111827; }
      .label { font: 600 18px Inter, Arial, sans-serif; fill: #8C2F29; }
      .bodySoft { font: 500 15px Inter, Arial, sans-serif; fill: #A34841; opacity: 0.88; }
      .meta { font: 500 14px Inter, Arial, sans-serif; fill: #A34841; opacity: 0.82; }
      .buttonText { font: 600 15px Inter, Arial, sans-serif; fill: #8C2F29; }
      .badgeText { font: 600 13px Inter, Arial, sans-serif; fill: #8C2F29; }
      .sectionLabel { font: 600 18px Inter, Arial, sans-serif; fill: #4B5563; }
    </style>
  </defs>

  <rect width="1440" height="980" fill="#F6F4EF"/>
  <text x="220" y="88" class="title">Improver Submission Success Preview · Light Mode</text>

  <text x="220" y="156" class="sectionLabel">Top Modal Success Banner</text>
  <g filter="url(#shadowLight)">
    <rect x="220" y="180" width="1000" height="160" rx="24" fill="#FFF4F1"/>
    <rect x="221" y="181" width="998" height="158" rx="23" stroke="#EB6C6C" stroke-opacity="0.25" stroke-width="2"/>
  </g>
  <circle cx="294" cy="260" r="36" fill="#059669"/>
  <path d="M277 260.5L289 272.5L313 248.5" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="346" y="248" class="label">Submission Complete</text>
  <text x="346" y="278" class="bodySoft">North Beach clean-up was submitted successfully.</text>
  <g>
    <rect x="1032" y="232" width="132" height="56" rx="16" fill="#FFFFFF" fill-opacity="0.9"/>
    <rect x="1033" y="233" width="130" height="54" rx="15" stroke="#EB6C6C" stroke-opacity="0.25" stroke-width="2"/>
    <text x="1080" y="266" text-anchor="middle" class="buttonText">Done</text>
  </g>

  <text x="220" y="486" class="sectionLabel">Submitted Step Card</text>
  <g filter="url(#shadowLightSoft)">
    <rect x="260" y="510" width="920" height="220" rx="24" fill="#FFF4F1"/>
    <rect x="261" y="511" width="918" height="218" rx="23" stroke="#EB6C6C" stroke-opacity="0.25" stroke-width="2"/>
  </g>
  <circle cx="320" cy="572" r="22" fill="#059669"/>
  <path d="M309 572L317 580L333 564" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="360" y="566" class="label">Submitted</text>
  <g>
    <rect x="460" y="542" width="94" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92"/>
    <rect x="461" y="543" width="92" height="28" rx="14" stroke="#EB6C6C" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="507" y="562" text-anchor="middle" class="badgeText">Recorded</text>
  </g>
  <text x="360" y="596" class="meta">Submitted on 3/25/2026, 10:42 AM</text>
  <g>
    <rect x="300" y="634" width="840" height="54" rx="16" fill="#FFFFFF" fill-opacity="0.88"/>
    <rect x="301" y="635" width="838" height="52" rx="15" stroke="#EB6C6C" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="344" y="666" class="buttonText">View details</text>
    <path d="M1090 656L1100 666L1110 656" stroke="#A34841" stroke-opacity="0.85" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
